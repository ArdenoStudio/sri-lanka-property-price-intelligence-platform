<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropertyLK — Sri Lanka Property Price Intelligence</title>
    <meta name="description" content="Real-time property price data, market trends, and listings for Sri Lanka. Browse 5,000+ cleaned listings across all 25 districts. Free and open." />
    <meta name="keywords" content="Sri Lanka property, Sri Lanka real estate, property prices Sri Lanka, land for sale Sri Lanka, houses Sri Lanka, Colombo property, PropertyLK" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://propertylk.vercel.app/" />
    <meta property="og:title" content="PropertyLK — Sri Lanka Property Price Intelligence" />

    <meta property="og:image" content="https://propertylk.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PropertyLK — Sri Lanka Property Price Intelligence" />

    <meta name="twitter:image" content="https://propertylk.vercel.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PropertyLK",
      "url": "https://propertylk.vercel.app/",
      "description": "Real-time property price intelligence for Sri Lanka",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://propertylk.vercel.app/?district={district}",
        "query-input": "required name=district"
      }
    }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
