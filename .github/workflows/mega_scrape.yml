name: Mega Scrape (Manual)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mega-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 libxcomposite1 \
            libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 xvfb

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run mega scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOMINATIM_USER_AGENT: ${{ secrets.NOMINATIM_USER_AGENT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SCRAPER_MAX_RETRIES: 3
          SCRAPER_BACKOFF_BASE_SECONDS: 5
          SCRAPER_BACKOFF_MAX_SECONDS: 60
          SCRAPER_STOP_AFTER_BLOCKS: 3
          LPW_PAGE_DELAY_MIN: 55
          LPW_PAGE_DELAY_MAX: 70
          LOG_LEVEL: INFO
        run: python3 run_all_scrapers.py --mega

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mega-scrape-logs
          path: logs/
          retention-days: 7
