name: AWS Lambda Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: property-price-api
  PYTHON_VERSION: "3.13"

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    concurrency: aws-lambda-deploy
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-property-price-api
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda package
        run: |
          python -m pip install --upgrade pip
          rm -rf package lambda.zip
          mkdir -p package
          python -m pip install \
            --requirement requirements-lambda.txt \
            --target package \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary=:all: \
            --upgrade
          # api.main imports scraper modules at import time — keep only those (drop Playwright scrapers)
          cp -r api db scraper package/
          find package/scraper -type f -name '*.py' \
            ! -name '__init__.py' \
            ! -name 'privacy.py' \
            ! -name 'pipeline_metrics.py' \
            ! -name 'quality.py' \
            ! -name 'flags.py' \
            -delete
          # Fail fast if API import graph is broken before we ship a 502ing function
          PYTHONPATH=package python -c "
from scraper.privacy import redact_contact_channels
from scraper.pipeline_metrics import build_pipeline_status, compute_pipeline_metrics
from scraper.quality import run_quality_checks
from scraper.flags import flag_snapshot
print('lambda_scraper_modules_ok', sorted(flag_snapshot()))
"
          cd package
          zip -r ../lambda.zip . -x '*.pyc' '*/__pycache__/*'

      - name: Update Lambda configuration
        run: |
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --handler api.main.handler \
            --runtime "python${PYTHON_VERSION}" \
            --timeout 30 \
            --memory-size 512 \
            >/dev/null
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://lambda.zip \
            >/dev/null
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Smoke test
        run: |
          function_url=$(aws lambda get-function-url-config \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query FunctionUrl \
            --output text)
          function_url="${function_url%/}"
          echo "Function URL: $function_url"
          for attempt in $(seq 1 12); do
            echo "Attempt $attempt/12 health..."
            status=$(curl --silent --output /tmp/smoke_body --write-out '%{http_code}' "$function_url/health") || true
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              echo "Health OK (HTTP $status)"
              cat /tmp/smoke_body
              echo
              # CORS preflight must succeed for the production Vercel origin
              opt_headers=$(curl --silent --output /dev/null --dump-header - \
                -X OPTIONS "$function_url/listings" \
                -H "Origin: https://propertylk-one.vercel.app" \
                -H "Access-Control-Request-Method: GET" \
                -H "Access-Control-Request-Headers: content-type")
              echo "$opt_headers"
              echo "$opt_headers" | grep -qi "access-control-allow-origin: https://propertylk-one.vercel.app"
              # Newest sort sanity: first_seen_at should be non-increasing
              curl --silent --fail "$function_url/listings?sort=newest&limit=8" -o /tmp/newest.json
              python3 -c '
          import json
          from datetime import datetime
          data = json.load(open("/tmp/newest.json"))
          rows = data.get("listings") or []
          assert rows, "no listings returned"
          firsts = [r.get("first_seen_at") for r in rows if r.get("first_seen_at")]
          parsed = [datetime.fromisoformat(x.replace("Z", "+00:00")) for x in firsts]
          assert parsed == sorted(parsed, reverse=True), f"newest not by first_seen_at: {firsts}"
          days = [r.get("days_on_market") for r in rows]
          print("newest_ok", {"days_on_market": days, "first_seen": firsts[:4], "total": data.get("total")})
          '
              exit 0
            fi
            echo "HTTP $status – response:"
            cat /tmp/smoke_body
            echo
            sleep 10
          done
          echo "Smoke test failed after 12 attempts"
          exit 1
