services:
  - type: web
    name: property-price-intelligence-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: NOMINATIM_USER_AGENT
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SCRAPER_MAX_RETRIES
        value: "3"
      - key: SCRAPER_BACKOFF_BASE_SECONDS
        value: "5"
      - key: SCRAPER_BACKOFF_MAX_SECONDS
        value: "60"
      - key: SCRAPER_STOP_AFTER_BLOCKS
        value: "3"
