# Copy this workflow into a standalone ikman-api-docs repo.
# In the monorepo it is inert unless paths filter matches on that repo.
name: Probe ikman API

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly Mon 06:00 UTC
  push:
    paths:
      - "ikman-api-docs/**"
      - ".github/workflows/ikman-api-docs-probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ikman-api-docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python3 scripts/probe.py
      - run: python3 scripts/build_site.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ikman-probe-report
          path: |
            ikman-api-docs/catalog/PROBE_REPORT.md
            ikman-api-docs/catalog/last_probe.json
            ikman-api-docs/samples/
